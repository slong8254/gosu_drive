{% if form.errors %}
  <div class="rounded-lg border border-rose-200 bg-rose-50 p-3 text-rose-800 text-sm">
    <ul class="list-disc list-inside space-y-1">
      {% for field, errors in form.errors.items %}
        {% for e in errors %}<li><strong>{{ field }}</strong> — {{ e }}</li>{% endfor %}
      {% endfor %}
    </ul>
  </div>
{% endif %}
